spring.application.name=Flow
cors.allowed.origins=*
csrf.enabled=true

spring.web.resources.static-locations=classpath:/frontend/

# Is aligned with the nginx client_max_body_size (80M) on production.
# file and request size are different because zip also includes file paths to decide file name and where the files are stored
spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=85MB

# Spring Application log settings
logging.level.root=INFO
logging.level.org.frankframework=INFO
logging.level.org.apache.coyote=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.apache.catalina=INFO
logging.level.org.apache.jasper=WARN
logging.level.jdk.event.security=WARN
logging.level.org.apache.naming=WARN
logging.level.org.springframework=WARN
logging.level.org.frankframework.management.gateway=DEBUG
logging.level.com.hazelcast=WARN
logging.level._org.springframework.web.servlet.HandlerMapping.Mappings=WARN

spring.jmx.enabled=false

application.security.http.authentication=false
